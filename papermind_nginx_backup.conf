server {
    listen 80;
    server_name papermindapp.com www.papermindapp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name papermindapp.com www.papermindapp.com;

    ssl_certificate /etc/letsencrypt/live/papermindapp.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/papermindapp.com-0001/privkey.pem;

    # 前端静态文件
    root /opt/papermind/web/dist;
    index index.html;

    # 文件上传大小限制（导出/上传场景）
    client_max_body_size 10m;

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 对话可能耗时较长
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # SPA 路由：所有非 /api/ 请求都返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
